[workspace]
name = "privox"
version = "1.0"
description = "Privox AI Assistant"
authors = ["Mark"]
channels = ["conda-forge", "pytorch", "nvidia"]
platforms = ["win-64", "osx-arm64"]

[tasks]
start = "python src/voice_input.py"
start-windowless = "pythonw src/voice_input.py"
# PYTHONNOUSERSITE: avoid picking PyInstaller from %APPDATA%\Python\... (wrong pkg_resources / setuptools).
build = { cmd = "python build_app.py", env = { PYTHONNOUSERSITE = "1" } }
# Refiner (Gemma 4): needs llama-cpp-python >=0.3.20 with CUDA. Optional: copy the built wheel to wheels/ before `pixi run build` to ship it in the installer.
install-llama-cuda = "python scripts/install_llama_cuda.py"
# Same env as install-llama-cuda (CUDA CMAKE_ARGS, Ninja, /utf-8). Do not use bare `pixi run pip wheel` for CUDA.
wheel-llama-cuda = "python scripts/install_llama_cuda.py --wheel"

[system-requirements]
macos = "14.0"

[dependencies]
python = ">=3.10,<3.13" # Support Python 3.10-3.12
pip = "*"
setuptools = "==69.5.1"

[target.win-64.dependencies]
cmake = "*"
ninja = "*"
# PyTorch 2.6 expects NumPy 2.x internals; keep below 2.4 for numba compatibility.
numpy = ">=2.0.0,<2.4.0"
packaging = "*"
pytorch-cuda = { version = "12.4.*", channel = "pytorch" }
cuda-toolkit = { version = "12.4.*", channel = "nvidia" }
cudnn = { version = "9.*", channel = "nvidia" }
llama-cpp-python = "*"
pywin32 = "*"

[target.osx-arm64.dependencies]
# Torch + torchaudio: Silero hub deps, optional MPS Qwen path, dev utilities. MLX stack is in pypi target below.
numpy = ">=2.0.0,<2.4.0"
packaging = "*"
pytorch = { version = "*", channel = "pytorch" }
torchaudio = { version = "*", channel = "pytorch" }

# Shared runtime: GUI, I/O, downloads. Heavy ASR stacks are target-specific (see below).
[pypi-dependencies]
# Also on PyPI: torch.hub / Silero VAD can import `packaging`; conda-only packaging sometimes missing from site-packages in Pixi merges.
packaging = ">=23.0"
# PyInstaller via PyPI — conda-forge record sometimes ends up out of sync on disk; pip keeps it in site-packages.
pyinstaller = ">=6.3.0"
sounddevice = "*"
pynput = "*"
pystray = "*"
pillow = "*"
pyperclip = "*"
huggingface_hub = "*"
colorama = "*"
pyside6 = "==6.8.1"

[target.osx-arm64.pypi-dependencies]
mlx = "==0.30.6"
mlx-lm = "==0.30.5"
mlx-whisper = "*"
mlx-audio = ">=0.3.1"
transformers = "==5.0.0rc3"
onnxruntime = "*"
# qwen-asr (PyTorch Qwen3-ASR) pins transformers 4.x and conflicts with mlx-lm's transformers 5.x pin.
# On Apple Silicon use ASR backend mlx_qwen_asr (mlx-audio) instead of qwen_asr.

[target.win-64.pypi-dependencies]
torch = { version = "==2.6.0+cu124", index = "https://download.pytorch.org/whl/cu124" }
torchaudio = { version = "==2.6.0+cu124", index = "https://download.pytorch.org/whl/cu124" }
torchvision = { version = "==0.21.0+cu124", index = "https://download.pytorch.org/whl/cu124" }
qwen-asr = "*"
faster-whisper = "*"
scipy = "*"
zhconv = "*"
diskcache = "*"
